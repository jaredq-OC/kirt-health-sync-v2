name: KirtHealthSync
options:
  bundleIdPrefix: com.kirt
  deployment:
    iOS: "26.3"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

schemes:
  KirtHealthSync:
    build:
      targets:
        KirtHealthSync: all
        KirtHealthSyncUITests: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - KirtHealthSyncUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

targets:
  KirtHealthSync:
    type: application
    platform: iOS
    sources:
      - path: Sources
        type: group
      - path: Resources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kirt.healthsync
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/KirtHealthSync.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
    dependencies:
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseAnalytics
      - sdk: UIKit.framework
      - sdk: HealthKit.framework
      - sdk: BackgroundTasks.framework

  KirtHealthSyncUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kirt.healthsync.uitests
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
    dependencies:
      - target: KirtHealthSync
